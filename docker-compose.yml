services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: exam_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: exam-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy

  frontend-admin:
    build: ./frontend-admin
    container_name: exam-admin
    ports:
      - "8081:80"
    depends_on:
      - backend

  frontend-user:
    build: ./frontend-user
    container_name: exam-user
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  mysql_data:
